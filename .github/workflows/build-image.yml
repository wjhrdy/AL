name: Build Pi image

# Builds a Raspberry Pi OS image with AL pre-installed, publishes it to a GitHub
# Release, and updates dist/repo.json (the Raspberry Pi Imager custom OS list)
# with the real download URL + checksums.
#
# Trigger by pushing a tag like v1.0.0, or run manually.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && TAG="${{ github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%F)" >> "$GITHUB_OUTPUT"

      - name: Build AL image
        id: build
        uses: pguyot/arm-runner-action@v2
        with:
          # Full Raspberry Pi OS desktop (arm64) — the app needs the desktop/X
          # session (DISPLAY=:0, autologin). *_latest is an official redirect.
          base_image: https://downloads.raspberrypi.com/raspios_arm64_latest
          image_additional_mb: 2048
          commands: |
            chmod +x dist/build-image-install.sh
            dist/build-image-install.sh

      - name: Compress image
        id: pack
        run: |
          IMG="${{ steps.build.outputs.image }}"
          OUT="AL_arm64.img"
          mv "$IMG" "$OUT"
          xz -T0 -6 -k "$OUT"            # keep both .img and .img.xz
          ls -la AL_arm64.img*

      - name: Update repo.json with checksums
        run: |
          python3 dist/gen_repo_json.py \
            --img AL_arm64.img --xz AL_arm64.img.xz \
            --repo "${{ github.repository }}" --tag "${{ steps.meta.outputs.tag }}" \
            --date "${{ steps.meta.outputs.date }}"
          cat dist/repo.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            AL_arm64.img.xz
            dist/repo.json

      # Done after publishing so the (untracked) image artifact is never disturbed.
      # Re-base onto the latest main before committing: a long build means main
      # may have moved (docs, other releases), so a plain push would be rejected.
      - name: Commit updated repo.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp dist/repo.json /tmp/repo.json
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/repo.json dist/repo.json
            if git diff --quiet -- dist/repo.json; then echo "no changes"; exit 0; fi
            git add dist/repo.json
            git commit -m "Update Imager repo.json for ${{ steps.meta.outputs.tag }}"
            if git push origin main; then exit 0; fi
            echo "push rejected (main moved); retry $attempt"
          done
          echo "::error::could not push repo.json after retries"; exit 1
